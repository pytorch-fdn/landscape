<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 320" width="100%" height="100%">
  <!-- Group to vertically balance the image slightly, moved left and down -->
  <g transform="translate(-25, 35)">
    <!-- Boba Cup Group -->
    <g id="boba-cup">
      <!-- Straw -->
      <line x1="210" y1="40" x2="170" y2="150" stroke="#4A3B32" stroke-width="18" stroke-linecap="round"/>
      
      <!-- Cup Base (Liquid and Cup Outline) -->
      <path d="M 90 90 L 270 90 L 240 260 C 235 275, 125 275, 120 260 Z" fill="#F9D466" stroke="#2C241D" stroke-width="12" stroke-linejoin="round"/>
      
      <!-- Lid/Rim -->
      <ellipse cx="180" cy="90" rx="105" ry="16" fill="#8B5A2B" stroke="#2C241D" stroke-width="10"/>

      <!-- Boba Pearls (Reduced count, uniform size, regular alignment) -->
      <circle cx="145" cy="245" r="14" fill="#2C241D"/>
      <circle cx="180" cy="245" r="14" fill="#2C241D"/>
      <circle cx="215" cy="245" r="14" fill="#2C241D"/>

      <!-- Network Graph Overlay -->
      <g id="network-graph">
        <!-- Edges connecting the nodes -->
        <line x1="180" y1="125" x2="130" y2="165" stroke="#2C241D" stroke-width="8"/>
        <line x1="180" y1="125" x2="230" y2="165" stroke="#2C241D" stroke-width="8"/>
        <line x1="130" y1="165" x2="180" y2="205" stroke="#2C241D" stroke-width="8"/>
        <line x1="230" y1="165" x2="180" y2="205" stroke="#2C241D" stroke-width="8"/>
        
        <!-- Nodes -->
        <circle cx="180" cy="125" r="16" fill="#F08A24" stroke="#2C241D" stroke-width="6"/>
        <circle cx="130" cy="165" r="16" fill="#F08A24" stroke="#2C241D" stroke-width="6"/>
        <circle cx="230" cy="165" r="16" fill="#F08A24" stroke="#2C241D" stroke-width="6"/>
        <circle cx="180" cy="205" r="16" fill="#F08A24" stroke="#2C241D" stroke-width="6"/>
      </g>
    </g>

    <!-- Text aligned to balance with the cup -->
    <text x="320" y="215" font-family="Arial, Helvetica, sans-serif" font-size="170" font-weight="900" fill="#000000" letter-spacing="2">AReaL</text>
  </g>
</svg>
